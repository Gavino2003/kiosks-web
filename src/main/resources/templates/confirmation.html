<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Encomenda confirmada</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header class="topbar">
    <span class="topbar-brand">KIOSKS</span>
</header>

<div class="confirmation-page">
    <div class="confirmation-card">
        <span class="conf-icon">✓</span>
        <h1>Encomenda confirmada</h1>
        <p class="sub">A sua encomenda foi registada.<br>Aguarde ser chamado pelo número abaixo.</p>

        <div class="order-ref-box">
            <div class="order-ref-label">Número de encomenda</div>
            <div class="order-ref-num" th:text="${reference}">ORD-2026-XXXXXXXX</div>
        </div>

        <div class="conf-total" th:text="${#numbers.formatDecimal(total,1,'COMMA',2,'POINT')} + ' €'">0,00 €</div>
        <div class="conf-store" th:text="${store.storeName}">Loja</div>

        <a th:href="@{/loja/{id}(id=${store.idStore})}" class="btn-home">Nova compra</a>
    </div>
</div>

</body>
</html>
