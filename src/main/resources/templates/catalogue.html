<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${store.storeName}">Catálogo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<header class="topbar">
    <select class="store-switcher" onchange="location.href='/loja/'+this.value">
        <option th:each="s : ${allStores}" th:value="${s.idStore}"
                th:text="${s.storeName}" th:selected="${s.idStore == store.idStore}">Loja</option>
    </select>
    <a th:href="@{/loja/{id}/carrinho(id=${store.idStore})}" class="cart-btn" id="cartBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="badge" th:if="${cart.totalItems > 0}" th:text="${cart.totalItems}">0</span>
    </a>
</header>

<!-- Toast de confirmação -->
<div class="toast" id="toast" th:if="${addedProductId != null}">Artigo adicionado ao carrinho</div>

<!-- VISTA: categorias -->
<div class="kiosk-page" th:if="${selectedCategory == null}">
    <div class="store-title" th:text="${store.storeName}">Loja</div>
    <div class="cat-grid">
        <a th:each="cat : ${categories}"
           th:href="@{/loja/{id}(id=${store.idStore}, categoria=${cat.idCategory})}"
           class="cat-tile">
            <span class="cat-tile-icon"
                  th:text="${#strings.containsIgnoreCase(cat.categoryName,'sol') ? '🕶️' :
                             #strings.containsIgnoreCase(cat.categoryName,'grau') ? '👓' :
                             #strings.containsIgnoreCase(cat.categoryName,'lente') ? '👁️' :
                             #strings.containsIgnoreCase(cat.categoryName,'lábi') or
                             #strings.containsIgnoreCase(cat.categoryName,'bato') ? '💄' :
                             #strings.containsIgnoreCase(cat.categoryName,'olho') or
                             #strings.containsIgnoreCase(cat.categoryName,'mascara') or
                             #strings.containsIgnoreCase(cat.categoryName,'sombra') ? '👁' :
                             #strings.containsIgnoreCase(cat.categoryName,'rosto') or
                             #strings.containsIgnoreCase(cat.categoryName,'base') ? '✨' :
                             #strings.containsIgnoreCase(cat.categoryName,'pele') or
                             #strings.containsIgnoreCase(cat.categoryName,'cuid') ? '🧴' :
                             #strings.containsIgnoreCase(cat.categoryName,'colar') ? '📿' :
                             #strings.containsIgnoreCase(cat.categoryName,'pulsei') ? '⌚' :
                             #strings.containsIgnoreCase(cat.categoryName,'brinco') ? '💎' :
                             #strings.containsIgnoreCase(cat.categoryName,'anel') ? '💍' :
                             '🛍️'}">🛍️</span>
            <span class="cat-tile-name" th:text="${cat.categoryName}">Categoria</span>
        </a>
    </div>
</div>

<!-- VISTA: produtos da categoria -->
<div class="kiosk-page" th:if="${selectedCategory != null}">
    <div class="products-header">
        <a th:href="@{/loja/{id}(id=${store.idStore})}" class="btn-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <span class="products-title" th:text="${selectedCategoryName}">Categoria</span>
    </div>

    <div class="product-grid" th:if="${!products.isEmpty()}">
        <div class="product-card" th:each="ps : ${products}"
             th:classappend="${addedProductId != null and addedProductId == ps.product.idProduct ? ' just-added' : ''}">

            <div th:if="${ps.product.imageUrl != null and !#strings.isEmpty(ps.product.imageUrl)}"
                 class="product-thumb-img">
                <img th:src="${ps.product.imageUrl}" th:alt="${ps.product.productName}"
                     onerror="this.parentElement.classList.add('img-error'); this.style.display='none'; this.nextElementSibling.style.display='flex'"/>
                <span class="thumb-fallback" style="display:none">🛍️</span>
            </div>
            <div th:if="${ps.product.imageUrl == null or #strings.isEmpty(ps.product.imageUrl)}"
                 class="product-thumb th-default">🛍️</div>

            <div class="product-body">
                <div class="product-name" th:text="${ps.product.productName}">Nome</div>
                <div class="product-price" th:text="${#numbers.formatDecimal(ps.product.price,1,'COMMA',2,'POINT')} + ' €'">0,00 €</div>
                <form th:action="@{/loja/{id}/carrinho/adicionar(id=${store.idStore})}" method="post">
                    <input type="hidden" name="productId" th:value="${ps.product.idProduct}"/>
                    <input type="hidden" name="qty" value="1"/>
                    <input type="hidden" name="categoria" th:value="${selectedCategory}"/>
                    <button class="btn-add" type="submit" th:disabled="${ps.stockQuantity == 0}"
                            th:text="${ps.stockQuantity == 0 ? 'Sem stock' : 'Adicionar'}">Adicionar</button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${products.isEmpty()}" class="empty-state">
        <p>Nenhum produto disponível</p>
    </div>
</div>

<script th:if="${addedProductId != null}">
    // Mostrar toast
    var t = document.getElementById('toast');
    if (t) {
        setTimeout(function() { t.classList.add('toast-show'); }, 50);
        setTimeout(function() { t.classList.remove('toast-show'); }, 2200);
    }
    // Pulsar ícone do carrinho
    var c = document.getElementById('cartBtn');
    if (c) {
        c.classList.add('cart-pulse');
        setTimeout(function() { c.classList.remove('cart-pulse'); }, 600);
    }
    // Limpar ?added= do URL sem reload
    var url = new URL(window.location);
    url.searchParams.delete('added');
    window.history.replaceState({}, '', url);
</script>

</body>
</html>
